name: Weekly database backup

# CLAUDE.md Section 12, Sprint 6 — not a substitute for Supabase's own
# point-in-time recovery (Pro plan), but a free, independent copy that
# doesn't depend on staying subscribed to that tier. Runs every Sunday at
# 03:00 UTC (05:00 SAST), and can be triggered manually from the Actions tab.
on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install postgresql-client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      # TEMPORARY — diagnosing repeated "password authentication failed"
      # despite a confirmed-correct, freshly reset password. Prints only the
      # connection string's structure (host/port/username, password masked)
      # and the password's character count — never the password itself — to
      # tell apart "the GitHub secret isn't what we think it is" from "the
      # password is genuinely wrong on Supabase's side". Remove once the
      # real cause is found.
      - name: Debug connection string (safe, no password shown)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Total length: ${#SUPABASE_DB_URL}"
          echo "Structure (password masked):"
          echo "$SUPABASE_DB_URL" | sed -E 's#(postgresql://[^:]+:)[^@]+(@.*)#\1****\2#'
          PW=$(echo "$SUPABASE_DB_URL" | sed -E 's#postgresql://[^:]+:([^@]+)@.*#\1#')
          echo "Password segment length: ${#PW}"

      - name: Dump database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          pg_dump "$SUPABASE_DB_URL" --no-owner --no-privileges -F c -f backup.dump

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup.dump
          retention-days: 90
