name: Weekly database backup

# CLAUDE.md Section 12, Sprint 6 — not a substitute for Supabase's own
# point-in-time recovery (Pro plan), but a free, independent copy that
# doesn't depend on staying subscribed to that tier. Runs every Sunday at
# 03:00 UTC (05:00 SAST), and can be triggered manually from the Actions tab.
on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      # Ubuntu's default apt repo ships postgresql-client 16, but this
      # Supabase project runs Postgres 17 — pg_dump refuses to dump from a
      # server newer than itself, so this pulls the matching client version
      # from the official PostgreSQL apt repo instead of the Ubuntu default.
      - name: Install postgresql-client 17
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-17

      - name: Dump database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          pg_dump "$SUPABASE_DB_URL" --no-owner --no-privileges -F c -f backup.dump

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup.dump
          retention-days: 90
