name: Trial reminders

# Foundation's free trial has no card at signup, so nothing in Paystack
# triggers on its own when a trial is 2 days out or has ended — this is
# what actually sends those emails. Runs daily at 07:00 UTC (09:00 SAST),
# and can be triggered manually from the Actions tab.
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Call trial-reminders endpoint
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sf -X GET "$SITE_URL/api/cron/trial-reminders" \
            -H "Authorization: Bearer $CRON_SECRET"
